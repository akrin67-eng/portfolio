<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Андрей Криницкий</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
</head>
<body>

<div class="app">

    <header class="header">
        <nav class="nav" aria-label="Основная навигация">
            <a href="index.html" class="active">Главная</a>
            <a href="about.html">Обо мне</a>
            <a href="contacts.html">Контакты</a>
        </nav>
    </header>

    <main class="main">
        <section class="gallery-container">
            <div class="gallery" id="gallery">
                <img id="galleryImage" alt="">
                <div id="galleryEmpty" class="gallery-empty hidden">В галерее пока нет изображений</div>
            </div>

            <div class="gallery-controls">
                <button id="firstBtn" type="button" title="Первая работа">⏮</button>
                <button id="prevBtn" type="button" title="Предыдущая">◀</button>
                <button id="nextBtn" type="button" title="Следующая">▶</button>
                <button id="lastBtn" type="button" title="Последняя">⏭</button>
            </div>
        </section>

        <aside class="sidebar">
            <div id="sections" class="sections"></div>
        </aside>
    </main>

    <section class="message-bar">
        <span id="messageText">Добро пожаловать в мое портфолио</span>
    </section>

    <div id="viewer" class="viewer hidden">
        <span id="viewerClose">×</span>
        <img id="viewerImage" alt="">
    </div>

</div>

<script src="js/gallery.js"></script>
<script src="js/messages.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
